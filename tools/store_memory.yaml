identity:
  name: "StoreMemory"
  author: "ce-mem"
  label:
    en_US: "StoreMemory"
    zh_Hans: "存储记忆"
  description:
    human:
      en_US: "Store a conversation turn into workflow memory"
      zh_Hans: "将对话内容存入工作流记忆"
    llm: "Store a conversation turn into workflow memory"
parameters:
  - name: key
    type: string
    required: true
    label:
      en_US: Memory Key
      zh_Hans: 记忆键
    human_description:
      en_US: "Unique identifier for the conversation session"
      zh_Hans: "对话会话的唯一标识"
    llm_description: "Unique identifier for the conversation session"
    form: llm

  - name: role
    type: string
    required: true
    label:
      en_US: Role
      zh_Hans: 角色
    human_description:
      en_US: "Message role, either 'user' or 'assistant'"
      zh_Hans: "消息角色，'user' 或 'assistant'"
    llm_description: "Message role, either 'user' or 'assistant'"
    form: llm

  - name: content
    type: string
    required: true
    label:
      en_US: Content
      zh_Hans: 内容
    human_description:
      en_US: "The message content"
      zh_Hans: "消息内容"
    llm_description: "The message content"
    form: llm

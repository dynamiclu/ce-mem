identity:
  name: "QueryMemory"
  author: "ce-mem"
  label:
    en_US: "QueryMemory"
    zh_Hans: "查询记忆"
  description:
    human:
      en_US: "Query conversation memory with specified number of turns"
      zh_Hans: "查询指定轮数的对话记忆"
    llm: "Query conversation memory with specified number of turns"
parameters:
  - name: key
    type: string
    required: true
    label:
      en_US: Memory Key
      zh_Hans: 记忆键
    human_description:
      en_US: "Unique identifier for the conversation session"
      zh_Hans: "对话会话的唯一标识"
    llm_description: "Unique identifier for the conversation session"
    form: llm

  - name: size
    type: number
    required: false
    default: 10
    label:
      en_US: Size
      zh_Hans: 对话轮数
    human_description:
      en_US: "Number of conversation turns to retrieve (default 10)"
      zh_Hans: "要检索的对话轮数（默认10）"
    llm_description: "Number of conversation turns to retrieve"
    form: llm
